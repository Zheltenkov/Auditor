      - name: OS_update
        description: >
          - There is a screenshot of the call and output of sudo apt upgrade command

          - In the last line of the output the number of all packages is 0

        rating: "5"
      - name: sudo
        description: >
          - The purpose of the sudo command is explained

          - There is a screenshot of the hostname command call and output

          - The command output is different from hostname in Part 3

        rating: "6"
      - name: Time_management
        description: >
          - There is a screenshot of the command call and output, that gives time in your current timezone

          - The output of the command contains the current date and time at which the report writer was able to call the command

          - There is a screenshot of the timedatectl command call and output

          - Command output contains NTPSynchronized=yes

        rating: "6"
      - name: Text_editors
        description: >
          - There are 3 screenshots of different text editors in which the test_X.txt file is opened, where X is the name of the editor in which the file was created

          - Each of the files contains a nickname

          - It is specified what is done to exit with the changes saved

          - There are 3 screenshots of different text editors in which the test_X.txt file is opened, where X is the name of the editor in which the file was created

          - There is a 21 School 21 line in each of the files

          - It is specified what is done to exit without saving changes

          - There are 3 screenshots of different text editors with word search results

          - There are 3 screenshots of different text editors with commands entered to replace one word with another

        rating: "6"
      - name: SSHD
        description: >
          - There are 5 points describing what has been done for all parts of the task

          - The meanings of the ps command and used in task keys are explained

          - There is a screenshot of the netstat -tan command call and output

          - The command output contains tcp 0 0.0.0.0:2022 0.0.0.0:* LISTEN

          - The meanings of -tan keys, the value of each output column, the value 0.0.0.0 are explained

