      - name: top_and_htop
        description: >
          - There is information about uptime, number of authorized users, total system load, total number of processes, cpu load, memory load, pid of the process taking the highest memory usage, pid of the process taking the most CPU time

          - There are screenshots of htop command output sorted by PID, PERCENT_CPU, PERCENT_MEM, TIME

          - There are screenshots of htop command output filtered for sshd process

          - There are screenshots of the htop command output with the syslog process found by searching

          - There are screenshots of the htop command output with hostname, clock and uptime output added

        rating: "6"
      - name: fdisk
        description: >
          - There is the name of the hard disk, its capacity and number of sectors, and also its swap size

        rating: "5"
      - name: df
        description: >
          - According to the df command output, the following parameters are specified: partition size, space used, space free, percentage used

          - It is specified in the report that unit used in the output is kibibyte

          - According to the df  -Th command output, the following parameters are specified: partition size, space used, space free, percentage used

          - It is specified in the report that the file system type is ext[number]

        rating: "6"
      - name: du
        description: >
          - There are screenshots of the du -h /home, du -h /var, du -h /var/log commands call and output

          - There is a screenshot of the du -ha /var/log/* command call and output

        rating: "5"
      - name: ncdu
        description: >
          - There are screenshots of the ncdu command interface showing the size of the /home, /var, /var/log folders

          - The shown sizes are approximately the same as in the du command's task

        rating: "5"
      - name: Logs
        description: >
          - There are the last successful login time, user name and login method

          - There is a screenshot of /var/log/syslog file showing the SSHd service restart message

        rating: "5"
      - name: CRON
        description: >
          - There is a screenshot of /var/log/syslog file reporting two calls to the uptime command with 2 minutes differences

          - There is a screenshot of the current task list for CRON

          - The screenshot has the */2 * * * * uptime line

        rating: "5"
