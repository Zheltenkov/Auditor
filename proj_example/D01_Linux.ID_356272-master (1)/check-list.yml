        rating: "5"
      - name: OS_network_configure
        description: >
          - There are 7 points describing what has been done for all parts of the task

          - There is an explanation for the presence of the lo interface in the output of the command showing the network interfaces

          - DHCP (Dynamic Host Configuration Protocol) is decoded

          - Hostname, timezone value, ip, gw, dns settings are given

          - There is a screenshot of call and output of ping 1.1.1.1 and ping ya.ru commands

          - There is the "0% packet loss" phrase in the next-to-last line of the command output

