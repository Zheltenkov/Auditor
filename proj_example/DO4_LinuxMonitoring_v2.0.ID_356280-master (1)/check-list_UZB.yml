introduction: >
  School 21 metodologiyasi qachonki tenga-teng tekshiruvlar jiddiy ravishda olib borilsagina o’z ma’nosiga ega bo’ladi. Iltimos tekshiruvni boshlashdan oldin barcha ko’rsatmalarni diqqat bilan o’qing. 

  - Iltimos, tekshiruv davomida suhbatlashayotganda xushmuomala, muloyim bo’ling va bir biringizni xurmat qiling.

  - Shaxs bajargan loyihaning mavjud bo’lgan kamchiliklarini ko’rsating va ularni muhokama qilishga vaqt ajrating.

  - Yodda tutingki, ba'zida vazifalarni talqin qilishda va funksiyalar ko'lamida farqlar bo'lishi mumkin. Iltimos, boshqalarning qarashlariga ochiq munosabatda bo'ling.
guidelines: >
  - Faqat talaba yoki jamoaning GIT omboridagi src papkasidagi fayllarni baholang.

  - Agar loyihani hali tugatmagan bo'lsangiz, tekshirishni boshlashdan oldin to'liq yo'riqnomani o'qib chiqishingiz shart.

  - Jamoa loyihasini ko'rib chiqishni faqat jamoa to'liq tarkibda ishtirok etganda boshlashni ta'minlang.

  - Quyidagilar haqida xabar berish uchun nazorat roʻyxatidagi maxsus bayroqchalardan foydalaning, masalan, agar omborda develop tarmog’ining src papkasida talaba (yoki jamoa)ning ishi boʻlmasa, “boʻsh loyiha” yoki ko’chirilgan taqdirda yoki agar talaba (yoki jamoa) ko'rib chiqish paytida istalgan vaqtda o'z ishini tushuntira olmasa, shuningdek, quyidagi bandlardan biri bajarilmasa, “ko’chirilgan” bayroqchasidan foydalaning. Biroq, ko’chirish holatlaridan tashqari, keyingi ko'rib chiqishda ularning oldini olish uchun vaziyatni keltirib chiqargan muammolarni aniqlash uchun loyihani ko'rib chiqishni davom ettirish tavsiya etiladi.

  - GIT ombori talaba yoki jamoa omboriga mos kelishini ikki marta tekshiring.

  - Sizni chalg’itish uchun hech qanday zararli narsa ishlatilmaganligini diqqat bilan tekshiring.

  - Bahsli holatlarda, nazorat ro'yxati faqat tekshirishning umumiy tartibini belgilashini unutmang. Loyihani baholash bo'yicha yakuniy qaror tekshiruvchida qoladi. 

  - Fikr-mulohazalar shakli to'ldirilgan yoki to'ldirilmaganligini tekshiring (https://new.oprosso.net/p/4cb31ec3f47a4596bc758ea1861fb624).

