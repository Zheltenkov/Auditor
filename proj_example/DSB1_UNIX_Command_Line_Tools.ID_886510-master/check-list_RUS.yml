introduction: >
  - Методология «Школы 21» способна приводить к высоким образовательным результатам, только если peer-to-peer оценка производится максимально ответственно. Этот документ призван помочь тебе в этом. Пожалуйста, прочитай его внимательно.

  - Будь доброжелательным, вежливым. Относись с уважением к другому человеку и проделанной им работе. Будь конструктивен, давая обратную связь.

  - Проверяя работу другого, отмечай для себя спорные и потенциально неверные моменты. Обсуди их с автором решения. Возможно, неправ ты, а не он.

  - Старайся быть открытым к другому мнению или способу интерпретировать задание. Возможно, и твой подход, и подход другого — оба имеют право на жизнь.
guidelines: >
  - Подлежат оцениванию только те файлы, которые учащийся или группа выложили в GIT-репозиторий.

  - Если ты ещё не закончил этот проект сам, перед проверкой обязательно перечитай всю инструкцию.

  - Начинай проверку группового проекта только при полном составе команды.

  - Ниже ты найдешь специальные теги для разных случаев: отсутствие решения, неработающее решение, плагиат. В этих случаях участник получает 0 баллов. В случае отсутствия плагиата мы призываем все равно продолжить проверку и попытаться вместе с другим учащимся выяснить проблему, приведшую к неработающему решению.

  - Дважды проверь, что перед тобой именно репозиторий нужного учащегося или группы.

  - Убедись, что тебя точно не пытались ввести в заблуждение каким бы то ни было способом.

  - В спорных ситуациях помни: чек-лист задаёт лишь общий порядок проверки. Итоговое решение по оценке остаётся за ревьюером.

quick_actions:
  - EMPTY_WORK
  - CHEAT
language: ru
name: Day00
comment: ""
sections:

  - kind: "1"
    name: Основная часть
    description: ""
    questions:
      - name: Упражнение 00. Получение данных
        description: >
          - Присутствует ли в каталоге репозитория файл hh.json?

          - Содержит ли hh.json сведения ровно о 20 вакансиях?

          - В случае выполнения запроса к HeadHunter API:

            - Присутствует ли в каталоге репозитория файл hh.sh?

            - Является ли hh.sh исполняемым?

            - В hh.sh нет жестко закодированных токенов или секретов?

            - Создаёт ли hh.sh файл hh.json в результате выполнения?

            - Работает ли hh.sh с разными ключевыми словами поиска, переданными аргументом?

            - Отформатирован ли hh.json так, что каждое поле JSON находится на отдельной строке?

        rating: "6"

      - name: Упражнение 01. Преобразование JSON в CSV
        description: >
          - Присутствуют ли в каталоге репозитория файлы filter.jq и hh.csv?

          - Генерирует ли filter.jq файл hh.csv?

          - Содержит ли hh.csv только указанные 5 столбцов?

          - Разделены ли все значения в каждой строке hh.csv запятой?

          - Содержит ли hh.csv заголовки столбцов?

          - Использованы ли только разрешённые утилиты для получения результата?

        rating: "6"

      - name: Упражнение 02. Сортировка файла
        description: >
          - Присутствуют ли в каталоге репозитория файлы sorter.sh и hh_sorted.csv?

          - Является ли sorter.sh исполняемым?

          - Создаёт ли sorter.sh файл hh_sorted.csv в результате выполнения?

          - Корректно ли отсортирован hh_sorted.csv?

          - Является ли hh_sorted.csv валидным CSV-файлом (разделитель — запятая, без пробелов до и после разделителя)?

          - Содержит ли hh_sorted.csv заголовки столбцов?

          - Использованы ли только разрешённые утилиты для получения результата?

        rating: "6"

      - name: Упражнение 03. Замена строк в файле
        description: >
          - Присутствуют ли в каталоге репозитория файлы cleaner.sh и hh_positions.csv?

          - Является ли cleaner.sh исполняемым?

          - Создаёт ли cleaner.sh файл hh_positions.csv в результате выполнения?

          - Корректно ли отсортирован hh_positions.csv?

          - Является ли hh_positions.csv валидным CSV-файлом?

          - Содержит ли hh_positions.csv заголовки столбцов?

          - Сохраняются ли строки "Junior", "Middle" и "Senior" в точном соответствии с условием?

          - Во всех прочих случаях используется ли "-" для поля?

          - Использованы ли только разрешённые утилиты для получения результата?

        rating: "6"

      - name: Упражнение 04. Описательная статистика
        description: >
          - Присутствуют ли в каталоге репозитория файлы counter.sh и hh_uniq_positions.csv?

          - Является ли counter.sh исполняемым?

          - Создаёт ли counter.sh файл hh_uniq_positions.csv в результате выполнения?

          - Корректно ли отсортирован hh_uniq_positions.csv?

          - Является ли hh_uniq_positions.csv валидным CSV-файлом?

          - Содержит ли hh_uniq_positions.csv заголовки столбцов?

          - Использованы ли только разрешённые утилиты для получения результата?

        rating: "6"

      - name: Упражнение 05. Разбиение и конкатенация
        description: >
          - Присутствуют ли в каталоге репозитория файлы partitioner.sh и concatenator.sh?

          - Являются ли partitioner.sh и concatenator.sh исполняемыми?

          - Создаёт ли partitioner.sh файлы с корректными именами, соответствующими датам?

          - Содержит ли каждый файл, созданный partitioner.sh, только строки с датой, соответствующей имени файла?

          - Является ли каждый такой файл валидным CSV-файлом?

          - Содержит ли каждый такой файл заголовки столбцов?

          - Принимает ли concatenator.sh на вход все файлы, созданные partitioner.sh?

          - Совпадает ли результат concatenator.sh с результатом Упражнения 03?

          - Использованы ли только разрешённые утилиты для получения результата?

        rating: "6"