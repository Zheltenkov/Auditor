language: ru
name: DSB3_OOP_skills
comment: ""
sections:

  - kind: "1"
    name: Основная часть
    description: ""
    questions:
      - name: Упражнение 00. Простой класс
        description: >
          - Содержит ли код класс `Must_Read`?

          - Работает ли скрипт согласно ожиданиям?

        rating: "6"

      - name: Упражнение 01. Метод
        description: >
          - Содержит ли код класс `Research`?

          - Содержит ли класс метод `file_reader()`?

          - Выводит ли скрипт ожидаемый результат по условию задания?

        rating: "6"

      - name: Упражнение 02. Конструктор
        description: >
          - Есть ли у класса конструктор `__init__()`, и сохраняется ли путь в переменную внутри конструктора?

          - Не принимает ли `file_reader()` путь к файлу в качестве аргумента?

          - Выбрасывается ли исключение при передаче файла с неверной схемой?

          - Выводит ли скрипт ожидаемый результат по условию задания?

        rating: "6"

      - name: Упражнение 03. Вложенный класс
        description: >
          - Имеет ли `file_reader()` аргумент `has_header` со значением по умолчанию `True`?

          - Если передать файлы с заголовком и без заголовка и указать соответствующее значение `has_header` в основной программе, выводит ли скрипт требуемую информацию?

          - Есть ли в коде класс `Calculations` с двумя методами: `counts()` и `fractions()`?

          - Корректно ли работают все методы?

        rating: "6"

      - name: Упражнение 04. Наследование
        description: >
          - Не принимает ли `counts()` аргумент `data`?

          - Сохранены ли данные в переменную внутри конструктора класса `Calculations`?

          - Наследуется ли `Analytics` от `Calculations`?

          - Корректно ли работают все методы?

          - Если запустить `counts()` из класса `Analytics`, работает ли он корректно, без ошибок?

        rating: "6"

      - name: Упражнение 05. Файл конфигурации и основная программа
        description: >
          - Хранятся ли все параметры в `config.py`?

          - Содержит ли `analytics.py` только импорты и классы с их методами, без логики основной программы?

          - Сохраняет ли `make_report.py` результат так, как описано в задании?

          - Если изменить параметры в `config.py`, меняется ли поведение программы?
          
        rating: "6"

      - name: Упражнение 06. Логирование
        description: >
          - Записывают ли все методы информацию о своей работе в файл `analytics.log`?

          - Соответствует ли формат log-файла требуемому?

          - Отправляет ли основная программа сообщения в Telegram в обоих случаях — когда отчёт успешно создан и когда произошла ошибка?

        rating: "6"
